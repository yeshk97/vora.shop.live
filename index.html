<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>VORA Finds — Curated Aesthetic Products</title>
    <meta name="description" content="Curated aesthetic products from Amazon and Flipkart. Simple. Easy. Trusted.">
    <meta name="theme-color" content="#faf9f7">
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script defer data-domain="yeshk97.github.io" src="https://plausible.io/js/script.tagged-events.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo-group">
                <span class="logo">VORA Finds</span>
                <span class="logo-tag">Curated</span>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="dark-mode-toggle" aria-label="Toggle dark mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
                <a href="https://instagram.com/vora.finds" target="_blank" class="ig-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                    @vora.finds
                </a>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="hero">
            <p class="hero-label">Handpicked Products</p>
            <h1 class="hero-title">Aesthetic Finds</h1>
            <p class="hero-subtitle">Curated picks for you</p>
        </section>

        <div class="sort-bar">
            <button class="sort-btn active" data-sort="popular">Top Selling</button>
            <button class="sort-btn" data-sort="price-low">Low to High</button>
            <button class="sort-btn" data-sort="price-high">High to Low</button>
        </div>

        <section class="products" id="products"></section>
    </main>

    <footer class="footer">
        <p class="footer-text">We may earn a commission from qualifying purchases</p>
        <a href="https://instagram.com/vora.finds" target="_blank" class="footer-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            Follow @vora.finds
        </a>
    </footer>

    <script src="js/deals.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
